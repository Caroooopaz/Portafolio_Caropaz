services:
  # Backend deployment (Django)
  - type: web
    name: django-backend
    env: python
    buildCommand: "cd backend && chmod +x build.sh && ./build.sh"
    preDeployCommand: "cd backend && python manage.py migrate && python create_superuser.py"
    startCommand: "cd backend && gunicorn core.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DB_NAME
        value: "postgres"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString

  # Frontend deployment (Vite)
  - type: web
    name: vite-frontend
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    publishPath: "./frontend/dist"
    envVars:
      - key: NODE_VERSION
        value: 20.0.0

databases:
  - name: portfolio-db
    databaseName: portfolio_db
    user: portfolio_user
